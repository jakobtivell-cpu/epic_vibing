# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - epicvibing

on:
  push:
    branches:
      - main
  workflow_dispatch:

# OneDeploy often returns 409 Conflict when two deploys hit the same App Service at once
# (overlapping workflow runs or SCM still finishing). Queue runs; do not cancel in-flight deploy.
concurrency:
  group: azure-epicvibing-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Install browsers under node_modules so the deploy artifact includes Chromium; matches App Service setting below.
      PLAYWRIGHT_BROWSERS_PATH: '0'
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: npm install
        run: npm install

      - name: Install Playwright Chromium for deployment artifact
        run: npx playwright install chromium --with-deps

      - name: Bundle Playwright Chromium shared libraries for Azure Linux
        run: |
          set -euo pipefail
          LIB_DIR="$GITHUB_WORKSPACE/playwright-linux-libs"
          mkdir -p "$LIB_DIR"
          shopt -s nullglob
          # Only skip core glibc + dynamic linker — they must match the host (Azure) glibc.
          # NSS stack (libnss3.so, libnssutil3.so, libnspr4.so, libplc4.so, libplds4.so, libsmime3.so, …)
          # is safe to bundle and must NOT be excluded (no glibc coupling; fixes missing libsmime3 on App Service).
          add_deps_for() {
            local target="$1"
            [ ! -f "$target" ] && return 0
            while read -r dep; do
              [ -z "$dep" ] && continue
              [ ! -f "$dep" ] && continue
              local b
              b=$(basename "$dep")
              case "$b" in
                libc.so.6|libm.so.6|libpthread.so.0|libdl.so.2|librt.so.1|ld-linux-x86-64.so.2) continue ;;
              esac
              [ -f "$LIB_DIR/$b" ] && continue
              cp -f "$dep" "$LIB_DIR/"
              ADDED_IN_ROUND=1
            done < <(ldd "$target" 2>/dev/null | awk '$3 ~ /^\// { print $3 }' || true)
          }
          mapfile -t bins < <(find node_modules/playwright-core/.local-browsers -type f \( -name chrome-headless-shell -o -path '*/chrome-linux/chrome' \) 2>/dev/null || true)
          if [ "${#bins[@]}" -eq 0 ]; then
            echo "::warning::No Playwright Chromium binary found under .local-browsers; skipping lib bundle"
            exit 0
          fi
          for bin in "${bins[@]}"; do
            echo "Collecting ldd dependencies for: $bin"
            add_deps_for "$bin"
          done
          # Transitive closure: e.g. libnss3.so -> libsmime3.so (not always listed on the main binary’s ldd line).
          for _ in $(seq 1 30); do
            ADDED_IN_ROUND=0
            for so in "$LIB_DIR"/*.so*; do
              [ -f "$so" ] || continue
              add_deps_for "$so"
            done
            [ "${ADDED_IN_ROUND:-0}" -eq 0 ] && break
          done
          echo "Bundled $(find "$LIB_DIR" -maxdepth 1 -type f | wc -l) shared libraries into playwright-linux-libs/"

      - name: Build
        run: npm run build --if-present

      - name: Copy data to dist for runtime
        run: cp -r data dist/data

      - name: npm test
        run: npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v6
        with:
          name: node-app
          # Default false — without this, paths under node_modules like playwright-core/.local-browsers can be omitted.
          include-hidden-files: true
          path: |
            dist
            app
            data
            package.json
            package-lock.json
            node_modules
            node_modules/playwright-core/.local-browsers
            playwright-linux-libs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v6
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_663BFF1624834F8C9198B62CA70E8D77 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CE4604E0BF284FF19CB7C66F563920C0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_27F003E865B54B258FEA209806B1CFC1 }}

      - name: Set App Service app setting PLAYWRIGHT_BROWSERS_PATH
        run: |
          set -e
          RG=$(az webapp list --query "[?name=='epicvibing'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "::error::Could not resolve resource group for web app epicvibing; check Azure subscription and permissions."
            exit 1
          fi
          az webapp config appsettings set \
            --name epicvibing \
            --resource-group "$RG" \
            --settings PLAYWRIGHT_BROWSERS_PATH=0 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=0

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'epicvibing'
          slot-name: 'Production'
          package: .
          